<svg viewBox="0 0 360 680" xmlns="http://www.w3.org/2000/svg" width="360" height="680">
  <defs>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1622"/>
      <stop offset="100%" stop-color="#0F2137"/>
    </linearGradient>

    <linearGradient id="phoneBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="50%" stop-color="#2A5080"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>

    <linearGradient id="phoneBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1E35"/>
      <stop offset="100%" stop-color="#0A1828"/>
    </linearGradient>

    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B1A2E"/>
      <stop offset="100%" stop-color="#091526"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1E35"/>
      <stop offset="100%" stop-color="#102440"/>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4A6E"/>
      <stop offset="100%" stop-color="#2A6090"/>
    </linearGradient>

    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A4A6E"/>
      <stop offset="100%" stop-color="#7EB8D4"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D3A2A"/>
      <stop offset="100%" stop-color="#A8D5B5"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1A4A6E" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#7EB8D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A4A6E" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <clipPath id="screenClip">
      <rect x="52" y="90" width="256" height="500" rx="6"/>
    </clipPath>

  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="360" height="680" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="180" cy="350" rx="150" ry="220" fill="#1A4A6E" opacity="0.07">
    <animate attributeName="opacity" values="0.05;0.12;0.05" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ═══ PHONE ═══ -->
  <rect x="35" y="45" width="290" height="600" rx="42" fill="#000" opacity="0.45" filter="url(#softShadow)"/>
  <rect x="30" y="30" width="300" height="620" rx="44" fill="url(#phoneBorder)"/>
  <rect x="34" y="34" width="292" height="612" rx="41" fill="url(#phoneBody)"/>
  <rect x="34" y="34" width="292" height="3" rx="3" fill="#2A5080" opacity="0.4"/>

  <!-- Buttons -->
  <rect x="26" y="180" width="6" height="36" rx="3" fill="#142235" stroke="#1E3A5F" stroke-width="0.8"/>
  <rect x="26" y="226" width="6" height="36" rx="3" fill="#142235" stroke="#1E3A5F" stroke-width="0.8"/>
  <rect x="328" y="200" width="6" height="52" rx="3" fill="#142235" stroke="#1E3A5F" stroke-width="0.8"/>

  <!-- ═══ SCREEN ═══ -->
  <rect x="52" y="90" width="256" height="500" rx="6" fill="url(#screenGrad)"/>
  <rect x="52" y="90" width="256" height="500" rx="6" fill="none" stroke="#1A3A5A" stroke-width="0.5"/>

  <!-- ═══ CONTENT ═══ -->
  <g clip-path="url(#screenClip)">

    <!-- STATUS BAR -->
    <rect x="52" y="90" width="256" height="26" fill="#091526"/>
    <text x="68" y="107" fill="#7EB8D4" font-size="9.5" font-family="monospace" opacity="0.8">9:41</text>
    <path d="M285,98 Q291,94 297,98" stroke="#7EB8D4" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M287,101 Q291,98 295,101" stroke="#7EB8D4" stroke-width="1.2" fill="none" opacity="0.7"/>
    <circle cx="291" cy="104" r="1.2" fill="#7EB8D4" opacity="0.9"/>
    <rect x="299" y="99" width="13" height="8" rx="1.5" fill="none" stroke="#7EB8D4" stroke-width="1" opacity="0.7"/>
    <rect x="312" y="101.5" width="2" height="3" rx="0.8" fill="#7EB8D4" opacity="0.6"/>
    <rect x="300.5" y="100.5" width="9" height="5" rx="0.8" fill="#7EB8D4" opacity="0.7"/>

    <!-- HEADER -->
    <rect x="52" y="116" width="256" height="56" fill="url(#headerGrad)"/>
    <line x1="52" y1="172" x2="308" y2="172" stroke="#1A3A5A" stroke-width="0.5"/>
    <circle cx="82" cy="144" r="18" fill="url(#blueGrad)" opacity="0.9"/>
    <circle cx="82" cy="144" r="18" fill="none" stroke="#7EB8D4" stroke-width="0.8" opacity="0.4"/>
    <text x="75" y="149" fill="#C8E6F5" font-size="14">⚡</text>
    <text x="108" y="138" fill="#E8F4FD" font-size="12" font-weight="bold" font-family="monospace">Flutter Dev</text>
    <text x="108" y="153" fill="#7EB8D4" font-size="9" font-family="monospace" opacity="0.75">Production · Clean Arch</text>
    <circle cx="284" cy="140" r="1.8" fill="#7EB8D4" opacity="0.4"/>
    <circle cx="291" cy="140" r="1.8" fill="#7EB8D4" opacity="0.4"/>
    <circle cx="298" cy="140" r="1.8" fill="#7EB8D4" opacity="0.4"/>

    <!-- CARD 1 — Architecture -->
    <rect x="62" y="182" width="234" height="76" rx="10" fill="#0D1E35" stroke="#1A3A5A" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="62" y="182" width="234" height="76" rx="10" fill="url(#shimmer)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" values="-234,0;234,0;-234,0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="74" y="193" width="26" height="26" rx="7" fill="url(#blueGrad)"/>
    <text x="80" y="210" fill="#C8E6F5" font-size="13">🏗</text>
    <text x="108" y="205" fill="#E8F4FD" font-size="10.5" font-weight="bold" font-family="monospace">Clean Architecture</text>
    <text x="108" y="218" fill="#7EB8D4" font-size="8.5" font-family="monospace" opacity="0.7">Feature-First · MVVM · DI</text>
    <rect x="74" y="228" width="210" height="3.5" rx="1.8" fill="#0A1828"/>
    <rect x="74" y="228" width="178" height="3.5" rx="1.8" fill="url(#tealGrad)">
      <animate attributeName="width" values="0;178" dur="1.8s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <text x="265" y="232" fill="#7EB8D4" font-size="7.5" font-family="monospace" opacity="0.8">85%</text>

    <!-- CARD 2 — State Management -->
    <rect x="62" y="268" width="234" height="86" rx="10" fill="#0D1E35" stroke="#1A3A5A" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="74" y="279" width="26" height="26" rx="7" fill="#0F2A48"/>
    <text x="80" y="296" fill="#C8E6F5" font-size="13">🧠</text>
    <text x="108" y="291" fill="#E8F4FD" font-size="10.5" font-weight="bold" font-family="monospace">State Management</text>
    <text x="108" y="304" fill="#7EB8D4" font-size="8.5" font-family="monospace" opacity="0.7">GetX · Bloc · Riverpod</text>
    <rect x="74"  y="312" width="32" height="14" rx="4" fill="#112840"/>
    <text x="80"  y="322" fill="#7EB8D4" font-size="7.5" font-family="monospace">GetX</text>
    <rect x="112" y="312" width="30" height="14" rx="4" fill="#112840"/>
    <text x="117" y="322" fill="#7EB8D4" font-size="7.5" font-family="monospace">Bloc</text>
    <rect x="148" y="312" width="46" height="14" rx="4" fill="#112840"/>
    <text x="153" y="322" fill="#7EB8D4" font-size="7.5" font-family="monospace">Riverpod</text>
    <rect x="200" y="312" width="36" height="14" rx="4" fill="#112840"/>
    <text x="205" y="322" fill="#7EB8D4" font-size="7.5" font-family="monospace">Redux</text>

    <!-- CARD 3 — CI/CD -->
    <rect x="62" y="364" width="234" height="76" rx="10" fill="#0D1E35" stroke="#1A3A5A" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="74" y="375" width="26" height="26" rx="7" fill="#0A2A1E"/>
    <text x="80" y="392" fill="#C8E6F5" font-size="13">🚀</text>
    <text x="108" y="387" fill="#E8F4FD" font-size="10.5" font-weight="bold" font-family="monospace">CI/CD Pipeline</text>
    <text x="108" y="400" fill="#A8D5B5" font-size="8.5" font-family="monospace" opacity="0.7">GitHub Actions · Fastlane</text>
    <rect x="74" y="410" width="210" height="3.5" rx="1.8" fill="#0A1828"/>
    <rect x="74" y="410" width="198" height="3.5" rx="1.8" fill="url(#greenGrad)">
      <animate attributeName="width" values="0;198" dur="2.2s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <text x="265" y="414" fill="#A8D5B5" font-size="7.5" font-family="monospace" opacity="0.8">95%</text>

    <!-- MINI CARDS -->
    <rect x="62"  y="450" width="110" height="68" rx="10" fill="#0D1E35" stroke="#1A3A5A" stroke-width="0.8"/>
    <text x="84"  y="472" fill="#E8F4FD" font-size="10" font-weight="bold" font-family="monospace">🧪 Testing</text>
    <text x="74"  y="487" fill="#7EB8D4" font-size="8" font-family="monospace" opacity="0.75">Unit · Widget</text>
    <text x="74"  y="499" fill="#7EB8D4" font-size="8" font-family="monospace" opacity="0.75">Integration · E2E</text>
    <rect x="186" y="450" width="110" height="68" rx="10" fill="#0D1E35" stroke="#1A3A5A" stroke-width="0.8"/>
    <text x="202" y="472" fill="#E8F4FD" font-size="10" font-weight="bold" font-family="monospace">🎨 UI/UX</text>
    <text x="196" y="487" fill="#7EB8D4" font-size="8" font-family="monospace" opacity="0.75">Animations</text>
    <text x="196" y="499" fill="#7EB8D4" font-size="8" font-family="monospace" opacity="0.75">Responsive</text>

    <!-- BOTTOM NAV -->
    <rect x="52" y="528" width="256" height="62" fill="#091526"/>
    <line x1="52" y1="528" x2="308" y2="528" stroke="#1A3A5A" stroke-width="0.6"/>
    <text x="85"  y="566" fill="#7EB8D4" font-size="18" filter="url(#glow)">⚡</text>
    <text x="141" y="566" fill="#7EB8D4" font-size="18" opacity="0.3">📱</text>
    <text x="197" y="566" fill="#7EB8D4" font-size="18" opacity="0.3">🧠</text>
    <text x="253" y="566" fill="#7EB8D4" font-size="18" opacity="0.3">👤</text>
    <rect x="81" y="577" width="26" height="3" rx="1.5" fill="#7EB8D4">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- SCAN LINE -->
    <rect x="52" y="116" width="256" height="1" fill="#7EB8D4" opacity="0">
      <animate attributeName="y" values="116;590;116" dur="5s" repeatCount="indefinite" calcMode="easeInOut"/>
      <animate attributeName="opacity" values="0;0.2;0" dur="5s" repeatCount="indefinite"/>
    </rect>

  </g>

  <!-- SCREEN GLOW -->
  <rect x="52" y="90" width="256" height="500" rx="6" fill="none" stroke="#7EB8D4" stroke-width="0.8" opacity="0.15">
    <animate attributeName="opacity" values="0.08;0.25;0.08" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- DYNAMIC ISLAND -->
  <rect x="132" y="52" width="96" height="22" rx="11" fill="#060E1A"/>
  <rect x="133" y="53" width="94" height="20" rx="10" fill="#091524"/>
  <circle cx="210" cy="63" r="5"   fill="#060E1A"/>
  <circle cx="210" cy="63" r="3"   fill="#0A1828"/>
  <circle cx="211" cy="62" r="0.6" fill="#7EB8D4" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- HOME INDICATOR -->
  <rect x="140" y="625" width="80" height="4" rx="2" fill="#1A3A5A" opacity="0.5"/>

  <!-- FLOATING PARTICLES -->
  <circle cx="22" cy="200" r="3.5" fill="#7EB8D4" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;175;200" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="280" r="2.5" fill="#7EB8D4" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="280;255;280" dur="4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="400" r="2" fill="#A8D5B5" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.4;0" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="400;375;400" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="344" cy="480" r="3" fill="#7EB8D4" opacity="0" filter="url(#glow)">
    <animate attributeName="opacity" values="0;0.35;0" dur="5s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="480;455;480" dur="5s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- CORNER BRACKETS -->
  <path d="M8,42 L8,22 L28,22"         stroke="#1A4A6E" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M352,22 L332,22 M352,22 L352,42" stroke="#1A4A6E" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M8,638 L8,658 L28,658"       stroke="#1A4A6E" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M332,658 L352,658 L352,638"  stroke="#1A4A6E" stroke-width="1.5" fill="none" opacity="0.5"/>

</svg>
